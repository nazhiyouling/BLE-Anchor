name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  APK_BASE_NAME: BLE-Anchor

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clean up invalid resource files (remove .ico)
        run: find app/src/main/res -name "*.ico" -type f -delete

      - name: Prepare launcher icon
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          if [ -f "app.png" ]; then
            cp app.png app/src/main/res/mipmap-hdpi/ic_launcher.png
            echo "Used custom app.png"
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
            echo "Generated placeholder icon"
          fi

      # 注入版本号，兼容大写 V 前缀
      - name: Inject version from Release Tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # 去掉前导的 v 或 V
          CLEAN_VERSION="$(echo "$TAG" | sed 's/^[vV]//')"
          echo "Injecting versionName = $CLEAN_VERSION"
          sed -i "s/versionName = \".*\"/versionName = \"$CLEAN_VERSION\"/" app/build.gradle.kts

      - name: Setup Gradle and generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 重命名 APK，文件名保留原始 Tag（含 V）
      - name: Rename APK with release version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          APK_NAME="${{ env.APK_BASE_NAME }}-${TAG}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: BLE-Anchor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
